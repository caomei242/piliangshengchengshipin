version: '3.8'

services:
  product-video-studio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-true}
    image: pixelle-video-product-studio:20260526
    container_name: pixelle-video-product-studio
    command: >
      .venv/bin/streamlit run scripts/product_video_studio.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false
    ports:
      - "30005:8501"
    environment:
      - TZ=Asia/Shanghai
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PIXELLE_RUNS_ROOT=/app/data/pixelle-ui-runs
      - PIXELLE_SAMPLE_ROOT=/app/data/sample_product
      - ARK_API_KEY=${ARK_API_KEY:-}
      - GRSAI_API_KEY=${GRSAI_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
