<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <meta name="viewport" content="width=1080, height=1080">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f6f1e8;
        }

        .stage {
            position: relative;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            background: #f6f1e8;
        }

        .media {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .soft-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background:
                linear-gradient(to bottom, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0) 24%, rgba(0, 0, 0, 0) 56%, rgba(0, 0, 0, 0.56)),
                radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.18));
        }

        .caption {
            position: absolute;
            z-index: 2;
            left: 56px;
            right: 56px;
            bottom: 52px;
            padding: 20px 26px;
            border-radius: 8px;
            background: rgba(24, 22, 20, 0.72);
            color: #ffffff;
            font-size: 40px;
            font-weight: 650;
            line-height: 1.32;
            text-align: center;
            letter-spacing: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="stage">
        <div class="media" id="media"></div>
        <div class="soft-overlay"></div>
        <div class="caption">{{text}}</div>
    </div>

    <script>
        (function () {
            var imageUrl = "{{image}}";
            var media = document.getElementById("media");
            if (imageUrl && imageUrl.trim() !== "" && imageUrl !== "None") {
                var img = document.createElement("img");
                img.src = imageUrl;
                img.alt = "商品主图";
                media.appendChild(img);
            }
        })();
    </script>
</body>

</html>
